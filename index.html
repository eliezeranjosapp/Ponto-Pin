<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<!-- ĶCONES E MANIFESTO -->

<link class="marcar-ios" rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2991/2991108.png">
<link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIkVzY2FsYSBFbGllemVyIiwKICAic2hvcnRfbmFtZSI6ICJFc2NhbGEiLAogICJzdGFydF91cmwiOiAiLiIsCiAgImRpc3BsYXkiOiAic3RhbmRhbG9uZSIsCiAgImJhY2tncm91bmRfY29sb3IiOiAiIzBmMTExNyIsCiAgInRoZW1lX2NvbG9yIjogIiMxMDEyMmIiLAogICJpY29ucyI6IFsKICAgIHsKICAgICAgInNyYyI6ICJodHRwczovL2Nkbi1pY29ucy1wbmcuZmxhdGljb24uY29tLzUxMi8yOTkxLzI5OTExMDgucG5nIiwKICAgICAgInNpemVzIjogIjUxMng1MTIiLAogICAgICAidHlwZSI6ICJpbWFnZS9wbmciCiAgICB9CiAgXQp9">

<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{background:#0f1117;color:#e8eaf0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;padding-bottom:120px;user-select:none;}
  header{background:#1a1d27;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:90;border-bottom:1px solid #2e3350;}
  header h1{font-size:18px;font-weight:bold;color:#fff;}
  .today-badge{background:#e85555;color:#fff;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:bold;letter-spacing:0.5px;}
  .today-badge.folga-badge{background:#38d9a9;color:#0f1117;}
  main{padding:16px;max-width:480px;margin:0 auto;}
  
  .stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px;}
  .stat-card{background:#1a1d27;border-radius:14px;padding:14px;text-align:center;border:1px solid #2e3350;}
  .stat-card .val{font-size:20px;font-weight:900;}
  .stat-card .val.blue{color:#4dabf7;}
  .stat-card .val.green{color:#38d9a9;}
  .stat-card .val.white{color:#fff;}
  .stat-card .lbl{font-size:11px;color:#7b82a0;margin-top:4px;text-transform:uppercase;letter-spacing:0.5px;}
  
  /* MELHORIA: Controles do Calendįrio */
  .cal-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding:0 4px;}
  .cal-nav span{font-size:14px;font-weight:bold;color:#7b82a0;}
  .btn-nav-cal{background:#22263a;border:1px solid #2e3350;color:#fff;padding:6px 14px;border-radius:8px;cursor:pointer;font-weight:bold;}
  
  .week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:20px;}
  .day-cell{background:#1a1d27;border:1px solid #2e3350;border-radius:10px;padding:10px 4px;text-align:center;cursor:pointer;transition:transform 0.1s;}
  .day-cell:active{transform:scale(0.95);}
  .day-cell .d-w{font-size:10px;color:#7b82a0;text-transform:uppercase;margin-bottom:4px;}
  .day-cell .d-n{font-size:15px;font-weight:bold;color:#fff;}
  .day-cell.has-data{border-color:#4dabf7;background:rgba(77,171,247,0.05);}
  .day-cell.has-folga{border-color:#38d9a9;background:rgba(56,217,169,0.05);}
  .day-cell.today-cell{background:#22263a;border:2px solid #e85555;}
  .day-cell.selected-cell{background:#2e3350;border-color:#fff;}
  
  .ponto-card{background:#1a1d27;border-radius:16px;padding:20px;margin-bottom:20px;border:1px solid #2e3350;}
  .ponto-card h2{font-size:16px;margin-bottom:14px;color:#fff;}
  .ponto-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #2e3350;}
  .ponto-row:last-child{border-bottom:none;}
  .ponto-row span{font-size:14px;color:#7b82a0;}
  .ponto-row strong{font-size:15px;color:#fff;}
  
  .btn-reg{background:#e85555;color:#fff;border:none;padding:10px 20px;border-radius:10px;cursor:pointer;font-size:14px;font-weight:bold;}
  .btn-sm{background:#22263a;border:1px solid #2e3350;color:#7b82a0;padding:6px 12px;border-radius:8px;cursor:pointer;font-size:12px;}
  
  .card-padrao{background:#1a1d27;border-radius:16px;padding:20px;margin-bottom:20px;border:1px solid #2e3350;}
  .card-padrao h2{font-size:16px;margin-bottom:14px;color:#fff;}
  
  /* MELHORIA: Estilos do Histórico Agrupado */
  .month-group{margin-bottom:20px;}
  .month-header{background:#22263a;padding:8px 12px;border-radius:8px;font-size:13px;font-weight:bold;color:#4dabf7;display:flex;justify-content:space-between;margin-bottom:6px;}
  .hist-item{display:flex;justify-content:space-between;align-items:center;padding:12px 8px;border-bottom:1px solid #2e3350;}
  .hist-item:last-child{border-bottom:none;}
  
  .btn-block{width:100%;display:block;padding:14px;background:#22263a;border:1px solid #2e3350;color:#fff;border-radius:12px;cursor:pointer;margin-bottom:10px;font-weight:bold;font-size:14px;text-align:center;}
  .btn-danger{background:#e85555;color:#fff;border:none;padding:14px;border-radius:12px;cursor:pointer;width:100%;font-weight:bold;font-size:14px;}
  
  nav{position:fixed;bottom:0;left:0;right:0;background:#1a1d27;display:flex;padding:14px 0;border-top:1px solid #2e3350;z-index:99;padding-bottom:calc(14px + env(safe-area-inset-bottom));}
  .nav-btn{flex:1;background:none;border:none;color:#7b82a0;font-size:12px;cursor:pointer;font-weight:bold;display:flex;flex-direction:column;align-items:center;gap:6px;}
  .nav-btn.active{color:#e85555;}
  .nav-icon{font-size:18px;}
  
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.2s;}
  .modal-overlay.open{opacity:1;pointer-events:all;}
  .modal{background:#1a1d27;border-radius:24px 24px 0 0;padding:24px 20px calc(24px + env(safe-area-inset-bottom));width:100%;max-width:480px;transform:translateY(100%);transition:transform 0.2s;}
  .modal-overlay.open .modal{transform:translateY(0);}
  .modal h3{font-size:18px;margin-bottom:16px;}
  .mrow{margin-bottom:14px;}
  .mrow label{font-size:12px;color:#7b82a0;display:block;margin-bottom:6px;}
  .mrow input, .mrow select{width:100%;background:#22263a;border:1px solid #2e3350;color:#fff;padding:12px;border-radius:10px;font-size:16px;outline:none;-webkit-appearance:none;}
  
  .view{display:none;}.view.active{display:block;}
  
  /* TELA DE LOCK */
  #lock-screen{position:fixed;inset:0;background:#0f1117;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .pin-dots{display:flex;gap:16px;margin:20px 0;}
  .dot{width:16px;height:16px;border-radius:50%;border:2px solid #2e3350;}
  .dot.filled{background:#e85555;border-color:#e85555;}
  .keyboard{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;width:100%;max-width:280px;margin-bottom:20px;}
  .key{background:#1a1d27;border:1px solid #2e3350;color:#fff;font-size:24px;font-weight:bold;padding:18px;border-radius:50%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;cursor:pointer;}
  .key:active{background:#22263a;}
  .remember-box{display:flex;align-items:center;gap:8px;color:#7b82a0;font-size:14px;cursor:pointer;margin-top:10px;}
  .remember-box input{accent-color:#e85555;}
</style>
</head>
<body>

<!-- TELA DE LOGIN PIN -->
<div id="lock-screen">
  <h2 style="font-size:20px;color:#fff;">Insira o seu PIN</h2>
  <div class="pin-dots" id="pin-dots">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>
  <div class="keyboard">
    <div class="key" onclick="pressPin(1)">1</div><div class="key" onclick="pressPin(2)">2</div><div class="key" onclick="pressPin(3)">3</div>
    <div class="key" onclick="pressPin(4)">4</div><div class="key" onclick="pressPin(5)">5</div><div class="key" onclick="pressPin(6)">6</div>
    <div class="key" onclick="pressPin(7)">7</div><div class="key" onclick="pressPin(8)">8</div><div class="key" onclick="pressPin(9)">9</div>
    <div class="key" style="visibility:hidden;"></div><div class="key" onclick="pressPin(0)">0</div><div class="key" onclick="clearPin()" style="font-size:14px;color:#7b82a0;">Limpar</div>
  </div>
  <label class="remember-box">
    <input type="checkbox" id="chk-remember"> Lembrar PIN por 7 dias
  </label>
</div>

<!-- CONTEŚDO DO APP -->
<div id="app-content" style="display:none;">
  <header>
    <h1 id="header-title">Escala Eliezer</h1>
    <div class="today-badge" id="today-badge">—</div>
  </header>

  <main>
    <!-- VIEW: HOJE -->
    <div class="view active" id="view-hoje">
      <div class="stats">
        <div class="stat-card"><div class="val blue" id="stat-dias">0</div><div class="lbl">Dias Trab.</div></div>
        <div class="stat-card"><div class="val green" id="stat-folgas">0</div><div class="lbl">Folgas</div></div>
        <div class="stat-card"><div class="val white" id="stat-horas">0h</div><div class="lbl">Banco Horas</div></div>
      </div>

      <!-- MELHORIA: Navegador de semanas -->
      <div class="cal-nav">
        <button class="btn-nav-cal" onclick="changeWeek(-7)"> Ant</button>
        <span id="cal-current-month">Mźs</span>
        <button class="btn-nav-cal" onclick="changeWeek(7)">Prox </button>
      </div>
      <div class="week-grid" id="week-grid"></div>

      <div class="ponto-card" id="ponto-body"></div>
    </div>

    <!-- VIEW: HISTÓRICO -->
    <div class="view" id="view-historico">
      <div class="card-padrao">
        <h2> Resumo por Perķodos</h2>
        <div id="historico-lista"></div>
      </div>
    </div>

    <!-- VIEW: CONFIGURAĒÕES -->
    <div class="view" id="view-config">
      <!-- MELHORIA: Carga Horįria Padrćo Regulįvel -->
      <div class="card-padrao">
        <h2> Sua Jornada Diįria</h2>
        <div class="mrow" style="margin-top:10px;">
          <label>Horas de trabalho padrćo por dia:</label>
          <select id="cfg-jornada" onchange="salvarConfigJornada()">
            <option value="360">06:00 h</option>
            <option value="420">07:00 h</option>
            <option value="480" selected>08:00 h</option>
            <option value="528">08:48 h</option>
            <option value="540">09:00 h</option>
          </select>
        </div>
      </div>
      <div class="card-padrao">
        <h2> Seguranēa</h2>
        <button class="btn-block" onclick="alterarPin()">Alterar PIN de Acesso</button>
      </div>
      <div class="card-padrao">
        <h2> Restaurar Sistema</h2>
        <button class="btn-danger" onclick="limparTodosDados()">Limpar Todos os Dados</button>
      </div>
    </div>
  </main>

  <nav>
    <button class="nav-btn active" id="nav-hoje" onclick="switchView('hoje')"><span class="nav-icon"></span>Hoje</button>
    <button class="nav-btn" id="nav-historico" onclick="switchView('historico')"><span class="nav-icon"></span>Histórico</button>
    <button class="nav-btn" id="nav-config" onclick="switchView('config')"><span class="nav-icon"></span>Ajustes</button>
  </nav>
</div>

<!-- MODAL DE PONTO -->
<div class="modal-overlay" id="modal-ponto" onclick="fecharModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <h3 id="modal-titulo">Registrar Horįrios</h3>
    <div class="mrow"><label>Entrada</label><input type="time" id="inp-ent" value="08:00"></div>
    <div class="mrow"><label>Almoēo (Saķda)</label><input type="time" id="inp-asai" value="12:00"></div>
    <div class="mrow"><label>Almoēo (Retorno)</label><input type="time" id="inp-aent" value="13:00"></div>
    <div class="mrow"><label>Saķda</label><input type="time" id="inp-sai" value="17:00"></div>
    <button class="btn-save" onclick="salvarPonto()">Salvar Registro</button>
  </div>
</div>

<script>
const KEY = 'escala_app_v3_prod';
let data = JSON.parse(localStorage.getItem(KEY)) || {};
let selectedDateKey = new Date().toISOString().split('T')[0];
let currentPivotDate = new Date(); // Controla qual semana estį sendo exibida
let currentPinInput = "";

// INICIALIZADOR DE SEGURANĒA & MELHORIA: Auto-Login por 7 dias
function initSecurity() {
    let pinDefinido = localStorage.getItem('app_pin') || '1234';
    localStorage.setItem('app_pin', pinDefinido);

    let rememberUntil = localStorage.getItem('app_remember_token');
    if (rememberUntil && new Date().getTime() < parseInt(rememberUntil)) {
        bypassLock();
    }
}

function pressPin(num) {
    if (currentPinInput.length < 4) {
        currentPinInput += num;
        updatePinDots();
    }
    if (currentPinInput.length === 4) {
        let pinCorreto = localStorage.getItem('app_pin') || '1234';
        if (currentPinInput === pinCorreto) {
            if(document.getElementById('chk-remember').checked) {
                let exp = new Date().getTime() + (7 * 24 * 60 * 60 * 1000);
                localStorage.setItem('app_remember_token', exp.toString());
            }
            bypassLock();
        } else {
            alert('PIN Incorreto!');
            clearPin();
        }
    }
}

function bypassLock() {
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('app-content').style.display = 'block';
    
    // Carrega jornada padrćo salva se houver
    let j = localStorage.getItem('app_jornada_padrao') || '480';
    document.getElementById('cfg-jornada').value = j;
    
    render();
}

function clearPin() { currentPinInput = ""; updatePinDots(); }
function updatePinDots() {
    let dots = document.querySelectorAll('#pin-dots .dot');
    dots.forEach((dot, idx) => dot.classList.toggle('filled', idx < currentPinInput.length));
}

function alterarPin() {
    let atual = prompt("Digite o PIN atual:");
    if(atual === localStorage.getItem('app_pin')) {
        let novo = prompt("Digite o novo PIN (4 dķgitos):");
        if(novo && novo.length === 4 && !isNaN(novo)) {
            localStorage.setItem('app_pin', novo);
            alert("PIN modificado com sucesso!");
        } else alert("Formato invįlido.");
    } else alert("PIN incorreto.");
}

function salvarConfigJornada() {
    let val = document.getElementById('cfg-jornada').value;
    localStorage.setItem('app_jornada_padrao', val);
    render();
}

// CĮLCULOS HORĮRIOS
function hToM(h) { if(!h) return 0; let [hh, mm] = h.split(':').map(Number); return (hh * 60) + mm; }
function mToH(m) {
    let sign = m < 0 ? '-' : ''; m = Math.abs(m);
    return `${sign}${String(Math.floor(m / 60)).padStart(2,'0')}:${String(m % 60).padStart(2,'0')}h`;
}
function calcMinutosTrabalhados(obj) {
    if (obj.tipo === 'folga') return 0;
    let t1 = hToM(obj.asai) - hToM(obj.ent), t2 = hToM(obj.sai) - hToM(obj.aent);
    return (t1 > 0 ? t1 : 0) + (t2 > 0 ? t2 : 0);
}

// ALTERNADOR DE ABAS
function switchView(viewName) {
    document.querySelectorAll('.view').forEach(e => e.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(e => e.classList.remove('active'));
    document.getElementById('view-' + viewName).classList.add('active');
    document.getElementById('nav-' + viewName).classList.add('active');
    render();
}

// MELHORIA: Navegar pelas semanas do calendįrio
function changeWeek(days) {
    currentPivotDate.setDate(currentPivotDate.getDate() + days);
    render();
}

function selecionarDia(dateStr) {
    selectedDateKey = dateStr;
    render();
}

// RENDERIZADOR CENTRAL DO APP
function render() {
    let contDias = 0, contFolgas = 0, totalMinutosBH = 0;
    let jPadrao = parseInt(localStorage.getItem('app_jornada_padrao') || '480');
    
    Object.keys(data).forEach(k => {
        if(data[k].tipo === 'trabalho') {
            contDias++;
            totalMinutosBH += (calcMinutosTrabalhados(data[k]) - jPadrao);
        } else if(data[k].tipo === 'folga') {
            contFolgas++;
        }
    });

    document.getElementById('stat-dias').textContent = contDias;
    document.getElementById('stat-folgas').textContent = contFolgas;
    document.getElementById('stat-horas').textContent = mToH(totalMinutosBH);

    // Render Grade de Dias com Pivō móvel
    let grid = document.getElementById('week-grid');
    grid.innerHTML = '';
    
    let mesesTexto = ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'];
    let diasSemana = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sįb'];
    
    // Alinha inķcio da grade no Domingo da semana selecionada
    let startOfWeek = new Date(currentPivotDate);
    startOfWeek.setDate(startOfWeek.getDate() - startOfWeek.getDay());
    
    document.getElementById('cal-current-month').textContent = `${mesesTexto[startOfWeek.getMonth()]} / ${startOfWeek.getFullYear()}`;

    for (let i = 0; i < 7; i++) {
        let d = new Date(startOfWeek);
        d.setDate(startOfWeek.getDate() + i);
        let k = d.toISOString().split('T')[0];
        
        let cell = document.createElement('div');
        cell.className = 'day-cell';
        if(k === new Date().toISOString().split('T')[0]) cell.classList.add('today-cell');
        if(k === selectedDateKey) cell.classList.add('selected-cell');
        
        if(data[k]) cell.classList.add(data[k].tipo === 'folga' ? 'has-folga' : 'has-data');
        
        cell.onclick = () => selecionarDia(k);
        cell.innerHTML = `<div class="d-w">${diasSemana[i]}</div><div class="d-n">${d.getDate()}</div>`;
        grid.appendChild(cell);
    }

    // Painel de controle inferior do Dia Selecionado
    let pBody = document.getElementById('ponto-body');
    let regDia = data[selectedDateKey];
    let [ano, mes, diaNum] = selectedDateKey.split('-');
    
    document.getElementById('today-badge').textContent = `${diaNum}/${mes}`;
    document.getElementById('today-badge').className = "today-badge " + (regDia?.tipo === 'folga' ? 'folga-badge' : '');

    if (!regDia) {
        pBody.innerHTML = `<h2>Dia ${diaNum}/${mes}</h2><p style="color:#7b82a0; font-size:14px; margin-bottom:16px;">Sem dados.</p>
            <div style="display:flex; gap:10px;">
                <button class="btn-reg" style="flex:1; background:#4dabf7;" onclick="abrirModalPonto()">Trabalho</button>
                <button class="btn-reg" style="flex:1; background:#38d9a9; color:#000;" onclick="marcarFolga()">Folga</button>
            </div>`;
    } else if (regDia.tipo === 'folga') {
        pBody.innerHTML = `<h2>Dia ${diaNum}/${mes} <span style="color:#38d9a9;">(Folga)</span></h2>
            <button class="btn-sm" onclick="deletarRegistro('${selectedDateKey}')">Remover Registro</button>`;
    } else {
        let mTrab = calcMinutosTrabalhados(regDia);
        pBody.innerHTML = `<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                <h2>Dia ${diaNum}/${mes}</h2><button class="btn-sm" onclick="deletarRegistro('${selectedDateKey}')">Remover</button>
            </div>
            <div class="ponto-row"><span>Entrada</span><strong>${regDia.ent}</strong></div>
            <div class="ponto-row"><span>Almoēo (Ida)</span><strong>${regDia.asai}</strong></div>
            <div class="ponto-row"><span>Almoēo (Volta)</span><strong>${regDia.aent}</strong></div>
            <div class="ponto-row"><span>Saķda</span><strong>${regDia.sai}</strong></div>
            <div class="ponto-row" style="border-top:1px dashed #2e3350; margin-top:6px; padding-top:12px;">
                <span>Horas lķquidas</span><strong style="color:#4dabf7;">${mToH(mTrab)}</strong>
            </div>`;
    }

    // MELHORIA: Histórico Agrupado de Forma Elegante por Mźs
    renderHistoricoAgrupado(jPadrao);
}

function renderHistoricoAgrupado(jPadrao) {
    let histLista = document.getElementById('historico-lista');
    histLista.innerHTML = '';
    
    let chavesOrdenadas = Object.keys(data).sort((a,b) => b.localeCompare(a));
    if(chavesOrdenadas.length === 0) {
        histLista.innerHTML = `<p style="color:#7b82a0; font-size:14px; text-align:center; padding:10px;">Nenhum histórico arquivado.</p>`;
        return;
    }

    let grupos = {};
    let nomesMeses = ["Janeiro", "Fevereiro", "Marēo", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];

    chavesOrdenadas.forEach(k => {
        let [ano, mes] = k.split('-');
        let nomeGrupo = `${nomesMeses[parseInt(mes)-1]} de ${ano}`;
        if(!grupos[nomeGrupo]) grupos[nomeGrupo] = [];
        grupos[nomeGrupo].push({key: k, obj: data[k]});
    });

    Object.keys(grupos).forEach(nomeGrupo => {
        let bloco = document.createElement('div');
        bloco.className = 'month-group';
        
        // Calcular totais do mźs para o cabeēalho
        let minMes = 0, folgasMes = 0;
        grupos[nomeGrupo].forEach(item => {
            if(item.obj.tipo === 'trabalho') {
                minMes += (calcMinutosTrabalhados(item.obj) - jPadrao);
            } else folgasMes++;
        });

        let headerDiv = document.createElement('div');
        headerDiv.className = 'month-header';
        headerDiv.innerHTML = `<span>${nomeGrupo}</span><span>Folgas: ${folgasMes} | Saldo: ${mToH(minMes)}</span>`;
        bloco.appendChild(headerDiv);

        grupos[nomeGrupo].forEach(item => {
            let [ano, mes, dia] = item.key.split('-');
            let itemDiv = document.createElement('div');
            itemDiv.className = 'hist-item';
            
            if(item.obj.tipo === 'folga') {
                itemDiv.innerHTML = `<span>Dia ${dia}</span><strong style="color:#38d9a9;">Folga</strong>`;
            } else {
                itemDiv.innerHTML = `<span>Dia ${dia} (${item.obj.ent} - ${item.obj.sai})</span><strong style="color:#4dabf7;">${mToH(calcMinutosTrabalhados(item.obj))}</strong>`;
            }
            bloco.appendChild(itemDiv);
        });

        histLista.appendChild(bloco);
    });
}

// CONTROLADORES DE EVENTO
function abrirModalPonto() {
    let reg = data[selectedDateKey];
    if(reg && reg.tipo === 'trabalho') {
        document.getElementById('inp-ent').value = reg.ent;
        document.getElementById('inp-asai').value = reg.asai;
        document.getElementById('inp-aent').value = reg.aent;
        document.getElementById('inp-sai').value = reg.sai;
    }
    document.getElementById('modal-ponto').classList.add('open');
}

function fecharModal() { document.getElementById('modal-ponto').classList.remove('open'); }

function salvarPonto() {
    data[selectedDateKey] = {
        tipo: 'trabalho',
        ent: document.getElementById('inp-ent').value,
        asai: document.getElementById('inp-asai').value,
        aent: document.getElementById('inp-aent').value,
        sai: document.getElementById('inp-sai').value
    };
    localStorage.setItem(KEY, JSON.stringify(data));
    fecharModal();
    render();
}

function marcarFolga() {
    data[selectedDateKey] = { tipo: 'folga' };
    localStorage.setItem(KEY, JSON.stringify(data));
    render();
}

function deletarRegistro(key) {
    if(confirm("Remover o registro selecionado?")) {
        delete data[key];
        localStorage.setItem(KEY, JSON.stringify(data));
        render();
    }
}

function limparTodosDados() {
    if (confirm("Excluir de vez toda a base de dados do aplicativo?")) {
        localStorage.clear();
        data = {};
        location.reload();
    }
}

window.onload = () => { initSecurity(); };
</script>
