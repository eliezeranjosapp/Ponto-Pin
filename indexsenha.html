<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#0f1117;color:#e8eaf0;font-family:Arial,sans-serif;padding-bottom:100px;}
  header{background:#1a1d27;padding:14px 20px;display:flex;justify-content:space-between;position:sticky;top:0;z-index:90;}
  header h1{font-size: 16px; text-transform: capitalize;}
  main{padding:18px 16px;max-width:480px;margin:0 auto;}
  .stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px;}
  .stat-card{background:#1a1d27;border-radius:12px;padding:12px;text-align:center;}
  .stat-card .val{font-size:20px;font-weight:900;}
  .val.positivo{color:#38d9a9;}
  .val.negativo{color:#e85555;}
  .week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:20px;}
  .day-cell{background:#1a1d27;border:1px solid #2e3350;border-radius:10px;padding:7px;text-align:center;cursor:pointer;}
  .day-cell.work-day{border-color:#e85555;}
  .day-cell.off-day{border-color:#38d9a9;}
  .ponto-card{background:#1a1d27;border-radius:16px;padding:18px;margin-bottom:20px;}
  .ponto-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid #2e3350;}
  .btn-reg{background:#e85555;color:#fff;border:none;padding:7px 13px;border-radius:8px;cursor:pointer;}
  .btn-edit{background:transparent;border:1px solid #2e3350;color:#7b82a0;padding:5px 8px;border-radius:7px;cursor:pointer;}
  .btn-sm{background:#22263a;border:1px solid #2e3350;color:#7b82a0;padding:5px 11px;border-radius:8px;cursor:pointer;}
  .btn-action{background:#22263a;border:1px solid #2e3350;color:#fff;padding:10px 14px;border-radius:10px;cursor:pointer;font-weight:bold;font-size:12px;display:inline-flex;align-items:center;gap:6px;margin-bottom:10px;}
  .btn-action.accent{background:#e85555;border:none;}
  .grafico-card{background:#1a1d27;border-radius:16px;padding:18px;margin-bottom:20px;}
  .grafico-card h2{font-size:13px;margin-bottom:14px;color:#7b82a0;}
  .bars-container{display:flex;align-items:flex-end;gap:6px;height:140px;}
  .bar-wrapper{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;}
  .bar{width:100%;background:#e85555;border-radius:6px;transition:height 0.3s;}
  .bar-value{font-size:9px;font-weight:700;}
  .bar-label{font-size:8px;color:#7b82a0;}
  
  .card-box{background:#1a1d27;border-radius:16px;padding:18px;margin-bottom:20px;}
  .card-box h2{font-size:14px;margin-bottom:12px;}
  
  .month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
  .mcell{background:#22263a;border:1px solid #2e3350;border-radius:8px;padding:8px;text-align:center;cursor:pointer;}
  .mcell.off{border-color:#38d9a9;background:rgba(56,217,169,0.1);}
  .mcell.off .mdd{color:#38d9a9;}
  .mcell.empty{visibility:hidden;}
  
  .hist-card{background:#1a1d27;border-radius:16px;padding:18px;}
  .hist-item{display:flex;justify-content:space-between;padding:11px 0;border-bottom:1px solid #2e3350;cursor:pointer;}
  .badge{font-size:11px;padding:3px 9px;border-radius:6px;}
  .badge.trabalhou{background:rgba(232,85,85,0.15);color:#e85555;}
  .badge.folgou{background:rgba(56,217,169,0.1);color:#38d9a9;}
  .badge.pendente{background:rgba(123,130,160,0.1);color:#7b82a0;}
  
  .escala-day{display:flex;align-items:center;background:#1a1d27;border:1px solid #2e3350;border-radius:12px;padding:11px 14px;margin-bottom:6px;cursor:pointer;gap:12px;}
  .escala-day.is-today{border-color:#e85555;}
  .escala-day.is-folga{border-color:#38d9a9;}
  .escala-day.is-trabalhou{border-color:#e85555;}
  .eday-date { text-align: center; min-width: 30px; }
  .eday-date .eday-num{font-size:22px;font-weight:900;}
  .eday-date .eday-num.blue{color:#e85555;}
  .eday-date .eday-num.green{color:#38d9a9;}
  .eday-info{flex:1;}
  .eday-status{font-size:13px;font-weight:700;}
  .eday-horas{font-size:13px;font-weight:700;color:#e85555;}

  nav{position:fixed;bottom:0;left:0;right:0;background:#1a1d27;display:flex;padding:10px 0 calc(10px + env(safe-area-inset-bottom));border-top:1px solid #2e3350;z-index:99;box-shadow: 0 -4px 10px rgba(0,0,0,0.3);}
  .nav-btn{flex:1;background:none;border:none;color:#7b82a0;font-size:11px;cursor:pointer;font-weight:bold;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;}
  .nav-btn span.icon{font-size: 20px;}
  .nav-btn.active{color:#e85555;}
  
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.2s;}
  .modal-overlay.open{opacity:1;pointer-events:all;}
  .modal{background:#1a1d27;border-radius:20px 20px 0 0;padding:22px 20px 40px;width:100%;max-width:480px;transform:translateY(40px);transition:transform 0.25s;}
  .modal-overlay.open .modal{transform:translateY(0);}
  .modal h3{font-size:16px;margin-bottom:5px;}
  .mrow{margin-bottom:14px;}
  .mrow label{display:block;font-size:12px;color:#7b82a0;margin-bottom:4px;}
  .mrow input{width:100%;background:#22263a;border:1px solid #2e3350;color:#fff;padding:12px;border-radius:10px;}
  .mactions{display:flex;gap:10px;margin-top:18px;}
  .btn-cancel{flex:1;padding:13px;background:#22263a;border:none;color:#7b82a0;border-radius:12px;cursor:pointer;}
  .btn-save{flex:2;padding:13px;background:#e85555;border:none;color:#fff;border-radius:12px;cursor:pointer;font-weight:bold;}
  
  .toast{position:fixed;bottom:95px;left:50%;transform:translateX(-50%);background:#22263a;padding:10px 20px;border-radius:10px;opacity:0;transition:0.25s;pointer-events:none;z-index:200;border:1px solid #2e3350;text-align:center;}
  .toast.show{opacity:1;}
  .view{display:none;}.view.active{display:block;}

  /* Tela de Bloqueio PIN */
  #pin-screen {position:fixed;inset:0;background:#0f1117;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
  .pin-dots {display:flex;gap:16px;margin:25px 0;}
  .pin-dot {width:16px;height:16px;border-radius:50%;border:2px solid #7b82a0;transition:0.1s;}
  .pin-dot.filled {background:#e85555;border-color:#e85555;}
  .pin-pad {display:grid;grid-template-columns:repeat(3,1fr);gap:15px;max-width:280px;width:100%;}
  .pin-btn {background:#1a1d27;border:1px solid #2e3350;color:#fff;font-size:24px;font-weight:bold;padding:20px;border-radius:50%;cursor:pointer;aspect-ratio:1;display:flex;align-items:center;justify-content:center;transition:background 0.1s;}
  .pin-btn:active {background:#2e3350;}
  
  @media print {
    body {background:#fff;color:#000;padding:0;}
    nav, header, .stats, .week-grid, .ponto-card, .btn-action, .grafico-card {display:none !important;}
    .view {display:block !important;}
    .hist-card {background:#fff;padding:0;}
    .hist-item {border-bottom:1px solid #ccc;color:#000;}
  }
</style>
</head>
<body>

<div id="pin-screen">
  <h2 id="pin-title" style="font-size:18px;margin-bottom:5px;">Introduza o PIN de Acesso</h2>
  <p id="pin-msg" style="font-size:13px;color:#7b82a0;">Digite os 4 dígitos</p>
  <div class="pin-dots">
    <div class="pin-dot" id="dot-0"></div>
    <div class="pin-dot" id="dot-1"></div>
    <div class="pin-dot" id="dot-2"></div>
    <div class="pin-dot" id="dot-3"></div>
  </div>
  <div class="pin-pad">
    <button class="pin-btn" onclick="pressPin(1)">1</button>
    <button class="pin-btn" onclick="pressPin(2)">2</button>
    <button class="pin-btn" onclick="pressPin(3)">3</button>
    <button class="pin-btn" onclick="pressPin(4)">4</button>
    <button class="pin-btn" onclick="pressPin(5)">5</button>
    <button class="pin-btn" onclick="pressPin(6)">6</button>
    <button class="pin-btn" onclick="pressPin(7)">7</button>
    <button class="pin-btn" onclick="pressPin(8)">8</button>
    <button class="pin-btn" onclick="pressPin(9)">9</button>
    <button class="pin-btn" style="background:transparent;border:none;font-size:14px;" onclick="clearPin()">Limpar</button>
    <button class="pin-btn" onclick="pressPin(0)">0</button>
    <button class="pin-btn" style="background:transparent;border:none;font-size:14px;color:#e85555;" onclick="backspacePin()">⌫</button>
  </div>
</div>

<header><h1 id="dynamic-header-title">Escala</h1><div class="today-badge" id="today-badge">—</div></header>
<main>
  <div class="view active" id="view-hoje">
    <div class="stats">
      <div class="stat-card"><div class="val blue" id="stat-dias">0</div><div class="lbl" style="font-size:10px;color:#7b82a0;margin-top:4px;">Trabalhados</div></div>
      <div class="stat-card"><div class="val" id="stat-banco">0h</div><div class="lbl" style="font-size:10px;color:#7b82a0;margin-top:4px;">Banco Horas</div></div>
      <div class="stat-card"><div class="val white" id="stat-horas">0h</div><div class="lbl" style="font-size:10px;color:#7b82a0;margin-top:4px;">Efetuadas</div></div>
    </div>
    <div class="week-grid" id="week-grid"></div>
    <div class="ponto-card"><div class="ponto-card-header" style="display:flex;justify-content:space-between;margin-bottom:14px"><h2>📋 Ponto — Hoje</h2><button class="btn-sm" onclick="abrirModalDia(todayKey)">✏️ Editar dia</button></div><div id="ponto-body"></div></div>
    <div class="resumo-card" id="resumo-card" style="display:none;background:#1a1d27;border-radius:16px;padding:18px;margin-bottom:20px"><h2 style="font-size:13px;color:#7b82a0;margin-bottom:12px">Resumo do dia</h2><div class="horas-big" id="horas-big" style="font-size:38px;font-weight:900;color:#e85555">—</div><div id="res-ef" style="margin-top:10px"></div></div>
    <div class="grafico-card"><h2>📊 Evolução Semanal</h2><div id="grafico-container"></div></div>
  </div>
  
  <div class="view" id="view-folgas"><div class="config-card" style="background:#1a1d27;border-radius:16px;padding:18px"><h2>🌿 Folgas de <span id="folgas-mes-nome"></span></h2><p style="font-size:12px;color:#7b82a0;margin:10px 0">Toque para marcar/desmarcar</p><div class="month-grid" id="month-grid"></div></div></div>
  
  <div class="view" id="view-escala"><div class="escala-header" style="margin-bottom:10px; font-weight:bold;"><span id="escala-mes-nome"></span></div><div id="escala-list"></div></div>
  
  <div class="view" id="view-historico">
    <div style="margin-bottom:15px; display:flex; gap:8px; flex-wrap:wrap;">
      <button class="btn-action accent" onclick="exportarCSV()">📊 Exportar Excel</button>
      <button class="btn-action" onclick="window.print()">🖨️ Gerar PDF</button>
      <button class="btn-action" onclick="abrirModal('modal-config')">⚙️ Configurações & Backup</button>
    </div>
    <div class="hist-card"><h2>📅 Histórico — <span id="hist-mes-nome"></span></h2><div id="hist-list"></div></div>
  </div>
</main>

<nav>
  <button class="nav-btn active" id="nav-hoje" onclick="switchView('hoje')"><span class="icon">🏠</span>Hoje</button>
  <button class="nav-btn" id="nav-folgas" onclick="switchView('folgas')"><span class="icon">🌿</span>Folgas</button>
  <button class="nav-btn" id="nav-escala" onclick="switchView('escala')"><span class="icon">📅</span>Escala</button>
  <button class="nav-btn" id="nav-historico" onclick="switchView('historico')"><span class="icon">📜</span>Painel</button>
</nav>

<div class="modal-overlay" id="modal-dia"><div class="modal"><h3 id="mdtitle">Editar Dia</h3><p class="modal-sub" id="mdsub"></p><div id="md-pontos"><div class="mrow"><label>Entrada</label><input type="time" id="md-entrada"></div><div class="mrow"><label>Saída Almoço</label><input type="time" id="md-almoco-saida"></div><div class="mrow"><label>Volta Almoço</label><input type="time" id="md-almoco-volta"></div><div class="mrow"><label>Saída</label><input type="time" id="md-saida"></div></div><div class="mactions"><button class="btn-cancel" onclick="fecharModal('modal-dia')">Cancelar</button><button class="btn-save" onclick="salvarDia()">Salvar</button></div></div></div>
<div class="modal-overlay" id="modal-hora"><div class="modal"><h3 id="mhtitle">Editar Horário</h3><div class="mrow"><label>Horário</label><input type="time" id="mh-input"></div><div class="mactions"><button class="btn-cancel" onclick="fecharModal('modal-hora')">Cancelar</button><button class="btn-save" onclick="salvarHora()">Salvar</button></div></div></div>

<div class="modal-overlay" id="modal-config"><div class="modal" style="border-radius:20px 20px 0 0; max-height:85vh; overflow-y:auto;"><h3>Ajustes & Segurança</h3><br>
  <div class="mrow"><label>Carga Horária Diária Padrão</label><input type="time" id="cfg-carga" value="08:00"></div>
  <div class="mrow"><label>Alterar PIN de Acesso (4 dígitos)</label><input type="password" pattern="[0-3]*" inputmode="numeric" maxlength="4" id="cfg-pin" placeholder="Deixe em branco para manter"></div>
  <hr style="border:0; border-top:1px solid #2e3350; margin:15px 0;">
  <h4 style="font-size:13px; margin-bottom:8px;">📦 Cópia de Segurança (Backup)</h4>
  <button class="btn-action" style="width:100%; justify-content:center;" onclick="fazerBackup()">📥 Descarregar Backup dos Dados</button>
  <div style="margin-top:12px;">
    <label style="display:block;font-size:12px;color:#7b82a0;margin-bottom:4px;">Restaurar arquivo de Backup</label>
    <input type="file" id="import-file" accept=".json" style="background:none; border:none; padding:0; color:#fff;" onchange="importarBackup(event)">
  </div>
  <div class="mactions"><button class="btn-cancel" style="flex:1;" onclick="fecharModal('modal-config')">Fechar</button><button class="btn-save" style="flex:1;" onclick="salvarConfiguracoes()">Gravar Configs</button></div>
</div></div>

<div class="toast" id="toast"></div>

<script>
const DAYS=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'],
      WEEK_LONG=['Domingo','Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado'],
      MONTHS=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'],
      KEY='escala_v5',
      DEFAULT={entrada:'14:00','almoco-saida':'16:00','almoco-volta':'17:00',saida:'22:20'},
      LABELS={entrada:'Entrada','almoco-saida':'Saída Almoço','almoco-volta':'Volta Almoço',saida:'Saída'};

function load(){try{return JSON.parse(localStorage.getItem(KEY))||{}}catch{return{}}}
function save(){localStorage.setItem(KEY,JSON.stringify(data))}

let data=load(), now=new Date(), todayKey=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
let currentPinInput = "";

// Gerenciamento de PIN de Acesso Local
function checkPinStatus() {
  if(!data._config) {
    data._config = { pin: "", carga: "08:00" };
    save();
  }
  if(!data._config.pin || data._config.pin === "") {
    document.getElementById('pin-screen').style.display = 'none';
    init();
  } else {
    document.getElementById('pin-title').textContent = "Introduza o PIN de Acesso";
    document.getElementById('pin-msg').textContent = "Aplicação protegida";
  }
}

function pressPin(num) {
  if (currentPinInput.length < 4) {
    currentPinInput += num;
    updatePinDots();
  }
  if (currentPinInput.length === 4) {
    setTimeout(validatePin, 150);
  }
}

function updatePinDots() {
  for (let i = 0; i < 4; i++) {
    document.getElementById(`dot-${i}`).classList.toggle('filled', i < currentPinInput.length);
  }
}

function clearPin() { currentPinInput = ""; updatePinDots(); }
function backspacePin() { currentPinInput = currentPinInput.slice(0, -1); updatePinDots(); }

function validatePin() {
  if (currentPinInput === data._config.pin) {
    document.getElementById('pin-screen').style.opacity = 0;
    setTimeout(() => {
      document.getElementById('pin-screen').style.display = 'none';
      init();
    }, 200);
  } else {
    showToast("⚠️ PIN Incorreto!");
    clearPin();
  }
}

function dk(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function isDayOff(d){return!!(data[dk(d)]&&data[dk(d)].folga)}

function init() {
  let currentDayLong = WEEK_LONG[now.getDay()];
  let currentDayNum = now.getDate();
  let currentMonthName = MONTHS[now.getMonth()];
  document.getElementById('dynamic-header-title').textContent = `${currentDayLong}, ${currentDayNum} de ${currentMonthName}`;
  document.getElementById('today-badge').textContent=isDayOff(now)?'🌿 Folga':'💼 Trabalho';
  
  if(!data._config) data._config = { pin: "", carga: "08:00" };
  document.getElementById('cfg-carga').value = data._config.carga || "08:00";

  renderWeek();renderPonto();renderStats();renderGrafico();
  
  if ('serviceWorker' in navigator) {
    const swCode = `self.addEventListener('fetch', function(e) { e.respondWith(fetch(e.request)); });`;
    const blob = new Blob([swCode], { type: 'application/javascript' });
    const swUrl = URL.createObjectURL(blob);
    navigator.serviceWorker.register(swUrl).catch(()=>{});
  }
}

function renderWeek(){let g=document.getElementById('week-grid'),dow=now.getDay(),mon=new Date(now);mon.setDate(now.getDate()-((dow===0?7:dow)-1));g.innerHTML='';for(let i=0;i<7;i++){let d=new Date(mon);d.setDate(mon.getDate()+i);let k=dk(d),isOff=isDayOff(d),isToday=k===todayKey,rec=data[k]||{},checked=rec.saida&&!isOff,c=document.createElement('div');c.className='day-cell'+(isOff?' off-day':' work-day')+(isToday?' today-cell':'')+(checked?' checked':'');c.innerHTML='<div class="dn">'+DAYS[d.getDay()]+'</div><div class="dd">'+d.getDate()+'</div>';c.onclick=()=>abrirModalDia(k);g.appendChild(c)}}

function renderPonto(){let isOff=isDayOff(now),rec=data[todayKey]||{},b=document.getElementById('ponto-body');if(isOff){b.innerHTML='<div style="text-align:center;padding:20px">🌿 Hoje é folga!</div>';document.getElementById('resumo-card').style.display='none';return}let tipos=['entrada','almoco-saida','almoco-volta','saida'],html='';tipos.forEach((t,i)=>{let val=rec[t],deps=[true,!!rec.entrada,!!rec['almoco-saida'],!!rec['almoco-volta']];html+='<div class="ponto-row"><div><strong>'+LABELS[t]+'</strong><br><small>'+DEFAULT[t]+'</small></div><div><span>'+(val||'--:--')+'</span><button class="btn-edit" onclick="abrirModalHora(\''+t+'\')">✏️</button>'+(val?'':'<button class="btn-reg" '+(deps[i]?'':'disabled')+' onclick="baterPonto(\''+t+'\')">Registrar</button>')+'</div></div>'});b.innerHTML=html;if(rec.entrada&&rec.saida){let a=rec.entrada.split(':'),b=rec.saida.split(':'),mt=(b[0]-a[0])*60+(b[1]-a[1]);document.getElementById('resumo-card').style.display='block';document.getElementById('horas-big').textContent=Math.floor(mt/60)+'h '+String(mt%60).padStart(2,'0')+'m';let mi=0;if(rec['almoco-saida']&&rec['almoco-volta']){let as=rec['almoco-saida'].split(':'),av=rec['almoco-volta'].split(':');mi=(av[0]-as[0])*60+(av[1]-as[1])}document.getElementById('res-ef').innerHTML='<strong>Horas efetivas: '+Math.floor((mt-mi)/60)+'h '+String((mt-mi)%60).padStart(2,'0')+'m</strong>'}else{document.getElem
